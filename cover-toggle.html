<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1.0">
    <title>Safe Area Content Test</title>
    <style>
        /* The body is dark so you can see where the browser adds letterboxing 
           when viewport-fit=cover is NOT active. */
        body {
            margin: 0;
            background-color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The content div gets the purple background */
        .content {
            background-color: #663399; /* RebeccaPurple */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;

            /* 
               CRITICAL PART: 
               Use max() to provide a default 20px padding, but switch to the 
               safe-area-inset if it's larger (e.g., when the notch is present 
               and viewport-fit=cover is active). 
            */
            padding-top: max(20px, env(safe-area-inset-top));
            padding-right: max(20px, env(safe-area-inset-right));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
        }

        h1 {
            margin-top: 0;
        }
