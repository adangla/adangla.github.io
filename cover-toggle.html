<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1.0">
    <title>Safe Area Content Test</title>
    <style>
        /* Dark background to reveal letterboxing when viewport-fit is off */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* The content div gets the purple background */
        .content {
            background-color: #663399; /* RebeccaPurple */
            color: #ffffff;
            width: 100%;
            min-height: 100vh; /* Fallback */
            min-height: 100dvh; /* Modern mobile height */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;

            /* Standard padding fallback if max() or env() fails */
            padding: 20px; 

            /* Safe area padding for notched devices */
            padding-top: max(20px, env(safe-area-inset-top));
            padding-right: max(20px, env(safe-area-inset-right));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left: max(20px, env(safe-area-inset-left));
        }

        h1 {
            margin-top: 0;
        }

        button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #663399;
            background-color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            margin-top: 20px;
        }

        button:active {
            transform: scale(0.98);
        }

        .status-container {
            margin-top: 24px;
            padding: 16px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            max-width: 90%;
            word-break: break-all;
        }

        code {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Safe Area Content Test</h1>
        <p>Rotate your phone to <strong>landscape mode</strong>.</p>
        <p>Watch how the text stays centered and avoids the notch, even as the purple background expands.</p>

        <button id="toggle-btn">Enable Viewport-Fit=Cover</button>

        <div class="status-container">
            <p>Current Viewport Content:</p>
            <code id="status-text">width=device-width, initial-scale=1.0</code>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggle-btn');
        const viewportMeta = document.getElementById('viewport-meta');
        const statusText = document.getElementById('status-text');
        
        let isCoverActive = false;

        toggleBtn.addEventListener('click', () => {
            isCoverActive = !isCoverActive;

            if (isCoverActive) {
                const newContent = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
                viewportMeta.setAttribute('content', newContent);
                
                statusText.innerText = newContent;
                toggleBtn.innerText = 'Disable Viewport-Fit=Cover';
            } else {
                const defaultContent = 'width=device-width, initial-scale=1.0';
                viewportMeta.setAttribute('content', defaultContent);
                
                statusText.innerText = defaultContent;
                toggleBtn.innerText = 'Enable Viewport-Fit=Cover';
            }
        });
    </script>
</body>
</html>
